<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrition Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen pb-8">

  <nav class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="font-bold text-green-700 text-base">Nutrition Tracker</span>
      <div class="flex gap-5 text-sm font-medium">
        <a href="/"        class="{% if request.url.path == '/' %}text-green-700{% else %}text-gray-500 hover:text-green-700{% endif %}">Today</a>
        <a href="/history" class="{% if request.url.path == '/history' %}text-green-700{% else %}text-gray-500 hover:text-green-700{% endif %}">History</a>
        <a href="/foods"   class="{% if request.url.path == '/foods' %}text-green-700{% else %}text-gray-500 hover:text-green-700{% endif %}">Foods</a>
      </div>
    </div>
  </nav>

  <main class="max-w-xl mx-auto px-4 pt-5">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
